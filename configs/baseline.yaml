# Experiment: baseline
# Dense CSNN baseline - no sparsity optimizations

name: "baseline"
seed: 42
description: "Dense CSNN baseline - no sparsity optimizations"

in_channels: 2
num_classes: 10
beta: 0.9
v_threshold: 1.0
rho: 0.05

epochs: 10
batch_size: 32
lr: 0.002
lambda_reg: 1e-7
dropout: 0.5
scheduler: "cosine"

T_max: 20
confidence_margin: 0.9
temperature: 5.0

use_gatekeeper: false
use_early_exit: false
use_adaptive_threshold: false
use_quantization: false
use_sparsity_reg: false

data_dir: "preprocessed_data_native"
results_dir: "results"
checkpoint_path: "best_baseline_model.pth"
